server:
  port: 8080

spring:
  application:
    name: examine-app
  profiles:
    active: dev

---
# 本地开发：请按需修改库名/账号；slave 可与 master 相同仅作多数据源占位
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://127.0.0.1:3306/examine?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
          username: root
          password: root
          driver-class-name: com.mysql.cj.jdbc.Driver
          druid:
            initial-size: 1
            min-idle: 1
            max-active: 20
            max-wait: 60000
            test-on-borrow: false
            test-while-idle: true
        slave:
          url: jdbc:mysql://127.0.0.1:3306/examine?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
          username: root
          password: root
          driver-class-name: com.mysql.cj.jdbc.Driver
          druid:
            initial-size: 1
            min-idle: 1
            max-active: 10

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
