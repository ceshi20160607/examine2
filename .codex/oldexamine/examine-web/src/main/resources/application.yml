server:
  port: ${SERVER_PORT:9999}

spring:
  application:
    name: examine-web
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:./config/
  jmx:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/examine?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: ${EXAMINE_FLYWAY_BASELINE_VERSION:22}
    validate-on-migrate: ${EXAMINE_FLYWAY_VALIDATE_ON_MIGRATE:false}
    repair-on-migrate: ${EXAMINE_FLYWAY_REPAIR_ON_MIGRATE:true}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${EXAMINE_MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}
  mapper-locations: classpath*:/com/unique/examine/**/mapper/xml/**/*.xml

logging:
  file:
    name: ${LOG_FILE:logs/examine-web.log}
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 100MB
  level:
    root: INFO
    com.unique.examine: INFO

springdoc:
  api-docs:
    enabled: true

knife4j:
  enable: true

management:
  metrics:
    enable:
      jvm: false
      process: false
      system: false
      tomcat: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      enabled: true

examine:
  session:
    store: ${EXAMINE_SESSION_STORE:redis}
  flyway:
    mark-applied: ${EXAMINE_FLYWAY_MARK_APPLIED:14}
  export-job:
    poll-ms: ${EXAMINE_EXPORT_JOB_POLL_MS:30000}
  trace:
    enabled: ${EXAMINE_TRACE_ENABLED:true}
  openapi:
    signing-master-key: ${EXAMINE_OPENAPI_SIGNING_MASTER_KEY:dev-only-openapi-signing-key-32bytes}
  upload:
    local-root-path: ${EXAMINE_UPLOAD_LOCAL_ROOT:data/uploads}
    max-size-mb: ${EXAMINE_UPLOAD_MAX_SIZE_MB:50}
    allowed-exts: ${EXAMINE_UPLOAD_ALLOWED_EXTS:jpg,jpeg,png,gif,webp,pdf,txt,csv,xlsx}
    allowed-content-types: ${EXAMINE_UPLOAD_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/gif,image/webp,application/pdf,text/plain,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
