# examine2 生产 Nginx 示例
# - 管理台静态：root 指向 release/web
# - API：/api/ 反代到后端 9999（去掉 /api 前缀）
# - 可选：手机 H5 静态放在 /m/

upstream examine_backend {
    server 127.0.0.1:9999;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    # 管理台 SPA（web/vue3 dist）
    root /opt/examine/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API：/api/v1/... → http://127.0.0.1:9999/v1/...
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://examine_backend/;
    }

    # 手机端 H5（可选，构建产物在 release/mobile/h5）
    location /m/ {
        alias /opt/examine/mobile-h5/;
        try_files $uri $uri/ /m/index.html;
    }
}
