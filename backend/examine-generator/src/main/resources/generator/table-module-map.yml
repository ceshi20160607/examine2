# MyBatis-Plus base CRUD generation mapping for unexamine.
# This file is intentionally environment-neutral: datasource values come from
# docs/service_info.md, a local override file, or EXAMINE_GENERATOR_* variables.

version: 1
project:
  name: unexamine
  rootDir: backend
  basePackage: com.unique.examine
  generatorModule: examine-generator

datasource:
  sources:
    - docs/service_info.md
    - backend/examine-generator/src/main/resources/config/generator-example.properties
    - EXAMINE_GENERATOR_DATASOURCE_URL
    - EXAMINE_GENERATOR_DATASOURCE_USERNAME
    - EXAMINE_GENERATOR_DATASOURCE_PASSWORD
  requiredKeys:
    url: generator.datasource.url
    username: generator.datasource.username
    password: generator.datasource.password
  forbidLegacyHardcodedValues:
    - legacyDatasourceHost
    - legacyDatabaseName
    - legacyPackageName
    - legacyCodexWorkspacePath

generation:
  author: examine-generator
  tablePrefix: un_
  artifacts:
    - entity
    - mapper
    - mapperXml
    - service
    - serviceImpl
  forbidArtifacts:
    - controller
  overwrite: true
  entity:
    lombok: true
    swaggerSchema: true
    tableNameAnnotation: true
  mapperXml:
    resourceRoot: src/main/resources/mapper/base
  service:
    interfaceSuffix: Service
    implementationSuffix: ServiceImpl
  report:
    path: backend/docs/mybatis-plus-generation.md
    includeDatasourceSource: true
    includeTableList: true
    includeModuleMapping: true
    includeOutputPaths: true

modules:
  plat:
    tablePrefixes:
      - un_plat_
    mavenModule: examine-plat
    packageName: com.unique.examine.plat.base
    sourceRoot: backend/examine-plat/src/main/java
    mapperXmlRoot: backend/examine-plat/src/main/resources/mapper/base
    stripPrefixes:
      - un_plat_
  module:
    tablePrefixes:
      - un_module_
    mavenModule: examine-module
    packageName: com.unique.examine.module.base
    sourceRoot: backend/examine-module/src/main/java
    mapperXmlRoot: backend/examine-module/src/main/resources/mapper/base
    stripPrefixes:
      - un_module_
  flow:
    tablePrefixes:
      - un_flow_
    mavenModule: examine-flow
    packageName: com.unique.examine.flow.base
    sourceRoot: backend/examine-flow/src/main/java
    mapperXmlRoot: backend/examine-flow/src/main/resources/mapper/base
    stripPrefixes:
      - un_flow_
  upload:
    tablePrefixes:
      - un_upload_
    mavenModule: examine-upload
    packageName: com.unique.examine.upload.base
    sourceRoot: backend/examine-upload/src/main/java
    mapperXmlRoot: backend/examine-upload/src/main/resources/mapper/base
    stripPrefixes:
      - un_upload_
  openapi:
    tablePrefixes:
      - un_openapi_
    mavenModule: examine-app
    packageName: com.unique.examine.app.base
    sourceRoot: backend/examine-app/src/main/java
    mapperXmlRoot: backend/examine-app/src/main/resources/mapper/base
    stripPrefixes:
      - un_openapi_
  core:
    tablePrefixes:
      - un_sys_
      - un_audit_
    mavenModule: examine-core
    packageName: com.unique.examine.core.base
    sourceRoot: backend/examine-core/src/main/java
    mapperXmlRoot: backend/examine-core/src/main/resources/mapper/base
    stripPrefixes:
      - un_sys_
      - un_audit_

excluded:
  legacyOpenApiHistoryPrefix: referenceOnly
  reason: Old project OpenAPI history tables are reference-only and are not generated in MVP.

validation:
  sourceSql: sql/init.sql
  requireEveryCreateTableMatched: true
  failOnUnknownPrefix: true
  failOnControllerTemplate: true
  failOnLegacyPackage: true
  expectedTableCount: 83

