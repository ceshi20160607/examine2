server:
  port: ${SERVER_PORT:9999}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/examine?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  flyway:
    enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

springdoc:
  api-docs:
    enabled: false

knife4j:
  enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

examine:
  openapi:
    signing-master-key: ${EXAMINE_OPENAPI_SIGNING_MASTER_KEY:change-me-openapi-signing-key-32bytes}
  upload:
    local-root-path: ${EXAMINE_UPLOAD_PATH:/data/examine/uploads}
    max-size-mb: 50
